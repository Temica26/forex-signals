<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Forex & Indices Dashboard</title>
<style>
body {
  margin: 0;
  font-family: 'Arial', sans-serif;
  background: #0a0a0a;
  color: #fff;
}
header {
  position: sticky;
  top: 0;
  background: #0a0a0a;
  padding: 15px 0;
  text-align: center;
  z-index: 100;
  border-bottom: 2px solid #ff6ec7;
}
header h1 {
  color: #ff6ec7;
  margin: 0;
  font-size: 24px;
}
#passwordDiv {
  margin-top: 50px;
  text-align: center;
}
#vipPass {
  padding: 12px;
  width: 200px;
  border-radius: 8px;
  border: none;
  font-size: 16px;
}
#enterBtn {
  padding: 12px 22px;
  margin-left: 10px;
  border-radius: 8px;
  border: none;
  background: #ff6ec7;
  color: #0a0a0a;
  font-weight: bold;
  font-size: 16px;
  cursor: pointer;
}
#dashboard {
  display: none;
  padding-bottom: 50px;
}
.tabs {
  display: flex;
  justify-content: center;
  gap: 15px;
  margin: 15px 0;
  flex-wrap: wrap;
}
.tab {
  padding: 12px 25px;
  cursor: pointer;
  border-radius: 30px;
  font-weight: bold;
  background: #1a1a1a;
  border: 2px solid #ff6ec7;
  color: #fff;
  font-size: 16px;
  transition: 0.3s;
}
.tab.active {
  background: #00c8ff;
  color: #0a0a0a;
  border-color: #00c8ff;
}
#signalContainer {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 0 10px;
  overflow-y: auto;
}
.card {
  border-radius: 20px;
  padding: 20px;
  margin: 10px 0;
  width: 95%;
  max-width: 420px;
  background: linear-gradient(135deg, #ff6ec7, #00c8ff);
  color: #0a0a0a;
  box-shadow: 0 4px 15px rgba(255,110,199,0.7), 0 4px 15px rgba(0,200,255,0.7);
  font-size: 16px;
}
.card h2 {
  margin: 0 0 10px 0;
  font-size: 20px;
}
.buy {
  color: #00c8ff;
  font-weight: bold;
  font-size: 20px;
}
.sell {
  color: #ff6ec7;
  font-weight: bold;
  font-size: 20px;
}
</style>
</head>
<body>

<header>
  <h1>Live Forex & Indices Dashboard</h1>
</header>

<div id="passwordDiv">
  <input type="password" id="vipPass" placeholder="Password">
  <button id="enterBtn" onclick="checkPass()">Enter</button>
</div>

<div id="dashboard">
  <div class="tabs">
    <div class="tab" id="scalpingTab" onclick="switchStyle('scalping')">Scalping</div>
    <div class="tab" id="dayTab" onclick="switchStyle('day')">Day Trading</div>
    <div class="tab" id="swingTab" onclick="switchStyle('swing')">Swing Trading</div>
  </div>
  <div id="signalContainer"></div>
</div>

<script>
// PASSWORD
function checkPass(){
  const p = document.getElementById("vipPass").value;
  if(p==="Teyam26"){
    document.getElementById("passwordDiv").style.display="none";
    document.getElementById("dashboard").style.display="block";
    loadAndRender();
    setInterval(loadAndRender, 120000); // refresh every 2 minutes
  } else alert("Access Denied");
}

// Current style
let currentStyle="scalping";

// Switch tabs
function switchStyle(style){
  currentStyle = style;
  renderSignals();
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  document.getElementById(style+"Tab").classList.add("active");
}

// Pairs by style
const pairsByStyle = {
  scalping:["XAUUSD=X","EURUSD=X","GBPUSD=X","JPY=X","AUDUSD=X","US30","^IXIC"],
  day:["XAGUSD=X","EURGBP=X","^GSPC","NZDUSD=X"],
  swing:["GBPNZD=X","^GDAXI","USDCAD=X","AUDJPY=X","^IXIC"]
};

// Fetch live price
async function fetchPrice(symbol){
  try{
    const res = await fetch("https://query1.finance.yahoo.com/v7/finance/quote?symbols="+symbol);
    const json = await res.json();
    return json.quoteResponse.result[0].regularMarketPrice;
  } catch(e){
    return null;
  }
}

let liveData = {};

// Load and render all signals
async function loadAndRender(){
  const pairs = pairsByStyle[currentStyle];
  liveData={};
  for(let s of pairs){
    liveData[s] = await fetchPrice(s);
  }
  renderSignals();
}

// Render cards
function renderSignals(){
  const container = document.getElementById("signalContainer");
  container.innerHTML="";
  for(let [sym,price] of Object.entries(liveData)){
    if(price===null) continue;
    const type = Math.random()>0.5?"BUY":"SELL";
    const entry = price;
    const tp1 = type==="BUY"? entry*1.005 : entry*0.995;
    const tp2 = type==="BUY"? entry*1.01 : entry*0.99;
    const sl  = type==="BUY"? entry*0.997 : entry*1.003;
    const conf = Math.floor(Math.random()*20)+70;
    const card = document.createElement("div");
    card.className="card";
    card.innerHTML = `
      <h2>${sym.replace("=X","").replace("^","")}</h2>
      <p class="${type.toLowerCase()}">${type}</p>
      Entry: ${entry.toFixed(4)}<br>
      TP1: ${tp1.toFixed(4)}<br>
      TP2: ${tp2.toFixed(4)}<br>
      SL: ${sl.toFixed(4)}<br>
      Confidence: ${conf}%
    `;
    container.appendChild(card);
  }
}
</script>

</body>
</html>
