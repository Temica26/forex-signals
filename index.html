<title>Forex Signal Dashboard</title>

body {

h1 {
  margin-top: 20px;

}

/* Tabs */
.tabs {
  display: flex;
  justify-content: center;
  margin: 20px 0;
  gap: 15px;
}
.tab {
  padding: 10px 20px;
  cursor: pointer;
  border-radius: 25px;
  font-weight: bold;
  background: #1a1a1a;
  color: #fff;
  border: 2px solid #ff6ec7;
  transition: 0.3s;
}
.tab.active {
  background: #00c8ff;
  color: #0a0a0a;
  border-color: #00c8ff;
}

/* Signal Card */
.card {
  border-radius: 15px;
  padding: 20px;
  margin: 15px auto;
  width: 90%;
  max-width: 400px;
  background: linear-gradient(145deg, #ff6ec7, #00c8ff);
  color: #0a0a0a;
  box-shadow: 0 0 15px rgba(255,110,199,0.7), 0 0 15px rgba(0,200,255,0.7);
}
.card h2 { margin-top: 0; }
.buy { color: #00c8ff; font-weight: bold; font-size: 22px; }
.sell { color: #ff6ec7; font-weight: bold; font-size: 22px; }
</style>
